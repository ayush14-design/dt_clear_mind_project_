<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consult Aura v2 — ClearMind</title>
<link rel="stylesheet" href="style.css">
<style>
  #onboarding { max-width: 1000px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
  .chat-box { height: 550px; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; margin-bottom: 32px; scroll-behavior: smooth; }
  .msg { max-width: 90%; position: relative; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .msg-bubble { padding: 20px 28px; border-radius: 24px; font-size: 18px; line-height: 1.7; white-space: pre-wrap; }
  .msg.bot .msg-bubble { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--white); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: linear-gradient(135deg, var(--teal), var(--purple)); color: white; border-bottom-right-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
  
  .msg-label { font-size: 11px; color: var(--teal-light); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .msg.user { align-self: flex-end; }
  .msg.user .msg-label { text-align: right; }

  /* Mood Bar */
  .mood-bar { display: flex; gap: 8px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
  .mood-btn { padding: 10px 20px; border-radius: 24px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text); cursor: pointer; white-space: nowrap; transition: 0.2s; font-size: 15px; }
  .mood-btn:hover { border-color: var(--teal); background: rgba(255,255,255,0.05); color: var(--white); }
  .mood-btn.active { border-color: var(--teal); background: var(--teal-glow); color: var(--white); }

  /* Breathing Section */
  .breathing-section { display: none; align-items: center; gap: 20px; padding: 20px; background: var(--glass-bg); border: 1px solid var(--teal); border-radius: 16px; margin-bottom: 24px; }
  .breath-circle { width: 50px; height: 50px; border-radius: 50%; background: var(--teal); box-shadow: 0 0 20px var(--teal-glow); }
  .breath-phase { font-size: 18px; color: var(--teal-light); font-weight: 500; }

  /* Quick Actions */
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .quick-btn { padding: 6px 14px; border-radius: 100px; border: 1px solid var(--glass-border); background: transparent; color: var(--text); cursor: pointer; font-size: 12px; transition: 0.2s; }
  .quick-btn:hover { border-color: var(--teal); color: var(--teal-light); }

  .input-area { display: flex; gap: 16px; align-items: center; background: var(--glass-bg); padding: 12px 20px; border-radius: 50px; border: 1px solid var(--glass-border); }
  .input-field { flex: 1; background: transparent; border: none; padding: 12px 24px; color: white; outline: none; font-size: 18px; }

  .typing-indicator { display: flex; gap: 8px; padding: 14px 20px; background: var(--glass-bg); border-radius: 20px; width: fit-content; margin-top: 5px; }
  .dot { width: 8px; height: 8px; background: var(--teal); border-radius: 50%; animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); } }

  .roadmap-container { display: none; margin-top: 40px; animation: fadeIn 1s forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  
  .day-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); padding: 24px; margin-bottom: 16px; transition: var(--transition); }
  .day-card:hover { border-color: var(--teal-light); transform: scale(1.02); }
  .day-title { color: var(--teal-light); font-weight: 600; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
</style>
</head>
<body>

<div class="hero-video-container">
  <video autoPlay loop muted playsInline>
    <source src="https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4" type="video/mp4" />
  </video>
</div>

<nav id="navbar">
  <a href="index.html" class="logo">Clear<span>Mind</span></a>
  <ul class="nav-links">
    <li><a href="index.html" data-i18n="nav_os">The OS</a></li>
    <li><a href="breathing.html" data-i18n="nav_breathe">Breath</a></li>
    <li><a href="sounds.html" data-i18n="nav_sounds">Frequencies</a></li>
  </ul>
  <button class="nav-cta" style="border-color:var(--rose); color:var(--rose);" onclick="logout()" data-i18n="dash_logout">Logout</button>
</nav>

<section id="onboarding">
  <div id="chat-ui" class="animate-in">
    <div style="text-align:center; margin-bottom:40px;">
       <div style="width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg, var(--teal), var(--purple)); margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:40px; box-shadow:0 0 40px var(--teal-glow);">🌿</div>
       <h2 style="font-size:32px; font-weight:300;">Clear Mind AI</h2>
    </div>

    <!-- Mood Bar -->
    <div class="mood-bar" id="moodBar">
      <button class="mood-btn" onclick="sendMood('overwhelmed')">😤 overwhelmed</button>
      <button class="mood-btn" onclick="sendMood('anxious')">😰 anxious</button>
      <button class="mood-btn" onclick="sendMood('sad')">😔 sad</button>
      <button class="mood-btn" onclick="sendMood('tired')">😴 tired</button>
      <button class="mood-btn" onclick="sendMood('okay')">🙂 okay</button>
    </div>

    <div class="chat-box glass" id="chatBox"></div>

    <!-- Breathing Visual -->
    <div class="breathing-section" id="breathSection">
      <div class="breath-circle" id="breathCircle"></div>
      <div>
        <div class="breath-phase" id="breathPhase">Breathe in...</div>
        <div style="font-size:12px; color:var(--text);">box breathing — 4s cycles</div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="quick-btn" onclick="quickAction('I need a grounding exercise')">🌿 ground me</button>
      <button class="quick-btn" onclick="quickAction('Give me a breathing exercise')">🫁 breathe</button>
      <button class="quick-btn" onclick="quickAction('I need a positive affirmation')">✨ affirmation</button>
      <button class="quick-btn" onclick="quickAction('Help me calm my racing thoughts')">🧘 calm thoughts</button>
    </div>

    <div class="input-area" id="inputArea">
      <input type="text" class="input-field" id="userInput" placeholder="Tell Aura what's on your mind..." onkeydown="if(event.key==='Enter')handleSend()">
      <button class="btn-primary" id="sendBtn" style="padding:10px 24px; border-radius:40px;" onclick="handleSend()">Send</button>
    </div>
  </div>

  <div id="roadmap-ui" class="roadmap-container">
    <h2 style="font-size:48px; font-weight:300; margin-bottom:40px; text-align:center;">Your Precision Roadmap</h2>
    <div id="roadmap-list" style="max-width:700px; margin:0 auto;"></div>
    <div style="text-align:center; margin-top:50px;">
      <a href="index.html" class="btn-primary">Return to Command Center</a>
    </div>
  </div>
</section>

<div id="toast">
  <div id="toast-title" style="font-weight:600; font-size:14px; color:var(--teal-light);"></div>
  <div id="toast-msg" style="font-size:12px; color:#ccc;"></div>
</div>

<script src="translations.js"></script>
<script src="shared.js"></script>
<script>
let chatHistory = [];
let msgCount = 0;
let breathInterval = null;

function addMsg(role, text) {
  const box = document.getElementById('chatBox');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role === 'user' ? 'user' : 'bot'}`;
  
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Clear Mind AI';
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  chatHistory.push({ role, content: text });
}

function showTyping() {
  const box = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'typing-indicator';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

async function handleSend(customMsg = null) {
  const inp = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const val = customMsg || inp.value.trim();
  if(!val) return;

  if(!customMsg) addMsg('user', val);
  inp.value = '';
  inp.disabled = true;
  btn.disabled = true;
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/ai/chat`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({ message: val, history: chatHistory.slice(0, -1) })
    });
    
    removeTyping();
    
    if (!res.ok) {
      const errData = await res.json();
      throw new Error(errData.error || 'Transmission interrupted');
    }
    
    const data = await res.json();
    addMsg('bot', data.response);
    msgCount++;

    if (val.toLowerCase().includes('breath') || val.toLowerCase().includes('breathing')) {
      startBreathing();
    }

    if(msgCount >= 3) {
        showRoadmapOption();
    }
  } catch(e) {
    removeTyping();
    addMsg('bot', `Architect, I am experiencing a synchronization error: ${e.message}. Please retry your transmission.`);
  } finally {
    inp.disabled = false;
    btn.disabled = false;
    inp.focus();
  }
}

function sendMood(mood) {
  const prompts = {
    overwhelmed: "I'm feeling really overwhelmed right now. There's too much going on.",
    anxious: "I'm feeling quite anxious and my heart is racing a bit.",
    sad: "I'm feeling sad and a bit low today.",
    tired: "I'm exhausted and emotionally drained.",
    okay: "I'm doing okay but wanted to check in."
  };
  addMsg('user', prompts[mood]);
  handleSend(prompts[mood]);
}

function quickAction(text) {
  addMsg('user', text);
  handleSend(text);
}

function startBreathing() {
  const section = document.getElementById('breathSection');
  const circle = document.getElementById('breathCircle');
  const phase = document.getElementById('breathPhase');
  section.style.display = 'flex';

  const phases = [
    { text: 'Breathe in...', scale: 1.5, duration: 4000 },
    { text: 'Hold...', scale: 1.5, duration: 4000 },
    { text: 'Breathe out...', scale: 1, duration: 4000 },
    { text: 'Hold...', scale: 1, duration: 4000 }
  ];

  let i = 0;
  if (breathInterval) clearInterval(breathInterval);

  function step() {
    const p = phases[i % phases.length];
    phase.textContent = p.text;
    circle.style.transition = `transform ${p.duration}ms ease-in-out`;
    circle.style.transform = `scale(${p.scale})`;
    i++;
  }

  step();
  breathInterval = setInterval(step, 4000);

  setTimeout(() => {
    if (breathInterval) clearInterval(breathInterval);
    section.style.display = 'none';
  }, 32000);
}

function showRoadmapOption() {
  if(document.getElementById('roadmapBtn')) return;
  const area = document.getElementById('chat-ui');
  const btn = document.createElement('button');
  btn.id = 'roadmapBtn';
  btn.className = 'btn-primary animate-in';
  btn.style.width = '100%';
  btn.style.marginTop = '24px';
  btn.style.background = 'linear-gradient(90deg, var(--teal), var(--purple))';
  btn.innerHTML = '✨ Generate Precision Roadmap';
  btn.onclick = generateRoadmap;
  area.appendChild(btn);
}

async function generateRoadmap() {
  const btn = document.getElementById('roadmapBtn');
  btn.textContent = 'Synthesizing Data...';
  btn.disabled = true;
  
  try {
    const res = await fetch(`${API_BASE}/ai/roadmap`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({ history: chatHistory })
    });
    const data = await res.json();
    
    document.getElementById('chat-ui').style.display = 'none';
    const roadmapUI = document.getElementById('roadmap-ui');
    roadmapUI.style.display = 'block';
    
    const list = document.getElementById('roadmap-list');
    data.roadmap.forEach(item => {
      let link = '#';
      if(item.type === 'breathing') link = 'breathing.html?start=true';
      else if(item.type === 'sounds') link = 'sounds.html?start=true';
      else if(item.type === 'focus') link = 'focus.html?start=true';
      else if(item.type === 'sleep') link = 'sleep.html?start=true';
      else if(item.type === 'journal') link = 'journal.html?start=true';
      else if(item.type === 'mood') link = 'mood.html?start=true';
      else if(item.type === 'games') link = 'games.html';

      const card = document.createElement('div');
      card.className = 'day-card glass';
      card.style.display = 'flex';
      card.style.alignItems = 'center';
      card.style.gap = '24px';
      
      card.innerHTML = `
        <div style="flex:1;">
          <div class="day-title">${item.day} — ${item.type}</div>
          <div style="font-size:18px; color:var(--white); margin-bottom:8px; font-family:var(--font-serif);">${item.activity}</div>
          <div style="font-size:13px; color:var(--text); font-style:italic;">Rationale: ${item.rationale}</div>
        </div>
        <a href="${link}" class="nav-cta" style="padding:10px 24px;">Begin</a>
      `;
      list.appendChild(card);
    });
    
    showToast('Success', 'Roadmap synthesis complete.');
  } catch(e) {
    showToast('Error', 'Failed to generate roadmap.');
    btn.disabled = false;
    btn.textContent = '✨ Generate Precision Roadmap';
  }
}

if(authToken) {
  addMsg('bot', "Greetings. I've synchronized with your neural history. How are you feeling right now? You can tap a mood above or just tell me what's on your mind.");
} else {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
