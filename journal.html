<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindful Journal — ClearMind</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  #journal-container { max-width: 800px; margin: 40px auto; }
  textarea { 
    width: 100%; height: 400px; background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
    padding: 30px; color: white; font-family: 'DM Sans', sans-serif; 
    font-size: 18px; line-height: 1.6; outline: none; transition: 0.3s;
    resize: none;
  }
  textarea:focus { border-color: var(--teal); background: rgba(255,255,255,0.05); }
  .prompt-box { padding: 20px; border-radius: 15px; margin-bottom: 20px; background: rgba(29, 184, 168, 0.1); border-left: 4px solid var(--teal); }
</style>
</head>
<body>

<div class="hero-video-container">
  <video autoPlay loop muted playsInline>
    <source src="https://res.cloudinary.com/dfonotyfb/video/upload/v1775585556/dds3_1_rqhg7x.mp4" type="video/mp4" />
  </video>
</div>

<nav id="navbar">
  <a href="index.html" class="logo">Clear<span>Mind</span></a>
  <ul class="nav-links">
    <li><a href="index.html">The OS</a></li>
    <li><a href="breathing.html">Breath</a></li>
    <li><a href="sounds.html">Frequencies</a></li>
  </ul>
  <button class="nav-cta" style="border:1px solid var(--rose); color:var(--rose); padding:8px 20px; border-radius:20px; background:none; cursor:pointer;" onclick="logout()">Logout</button>
</nav>

<section id="journal-container">
  <p style="color:var(--teal-light); text-transform:uppercase; letter-spacing:2px; font-size:12px; margin-bottom:10px;">Cognitive Unloading</p>
  <h2 style="font-family:'Cormorant Garamond',serif; font-size:48px; font-weight:300; margin-bottom:30px;">Mindful Journal</h2>

  <div class="prompt-box">
    <p style="font-size:14px; color:var(--white); font-weight:500;">Today's Focus Prompt:</p>
    <p id="promptText" style="font-size:16px; color:var(--text); margin-top:5px;">What is one thing you can control today, and one thing you are choosing to let go of?</p>
  </div>

  <textarea id="journalArea" placeholder="Begin your flow of consciousness here..."></textarea>
  
  <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
    <p style="color:var(--text); font-size:12px;">Your entries are private and securely stored.</p>
    <button class="btn-primary" onclick="saveJournal()">Save Entry</button>
  </div>
</section>

<div id="toast">
  <div id="toast-title" style="font-weight:600; font-size:14px; color:var(--teal-light);"></div>
  <div id="toast-msg" style="font-size:12px; color:#ccc;"></div>
</div>

<script src="shared.js"></script>
<script>
if(!checkAuth()){}
const prompts = [
    "What is one thing you can control today, and one thing you are choosing to let go of?",
    "Describe a moment today when you felt fully present.",
    "If your stress was a physical object, what would it look like? Now, imagine it dissolving.",
    "Write down three small wins from the last 24 hours.",
    "What is a boundary you need to set this week to protect your energy?"
];
document.getElementById('promptText').textContent = prompts[Math.floor(Math.random()*prompts.length)];

async function saveJournal() {
  const content = document.getElementById('journalArea').value;
  const prompt = document.getElementById('promptText').textContent;
  
  if(!content.trim()) return showToast('Empty', 'Please write something before saving.');
  
  try {
    const res = await fetch(`${API_BASE}/journal`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization': `Bearer ${authToken}`},
      body: JSON.stringify({ content, prompt })
    });
    const data = await res.json();
    if(data.success) {
      showToast('Saved', 'Your reflection has been securely stored.');
      document.getElementById('journalArea').value = '';
    } else {
      throw new Error(data.error);
    }
  } catch(e) {
    showToast('Error', 'Failed to save entry.');
  }
}

const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('start') === 'true') {
  setTimeout(() => {
    document.getElementById('journalArea').focus();
    showToast('Journal Sync', 'Your cognitive unloading session has begun.');
  }, 1000);
}
</script>
</body>
</html>
